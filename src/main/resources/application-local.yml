spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  application:
    name: course-registration

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 토이면 update 또는 create-drop
    database-platform:
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2000
      database: 0

  #  mvc:
  #    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  servlet:
    session:
      timeout: 30m # 마지막 활동으로부터 30분 지나면 로그아웃