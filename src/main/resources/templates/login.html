<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한양대학교 포털 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: #4a90e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-login:hover {
            background: #357abd;
        }

        .error-message {
            background: #ffeaea;
            border: 1px solid #ffcdd2;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .divider {
            margin: 30px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e5e9;
        }

        .divider span {
            background: white;
            color: #666;
            padding: 0 15px;
            font-size: 14px;
        }

        .link-section {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .link-section a {
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .link-section a:hover {
            text-decoration: underline;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            color: #666;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">HY</div>
        <h1 class="title">한양대학교 포털</h1>
        <p class="subtitle">학사 관리 시스템 로그인</p>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">학번 또는 아이디</label>
            <input type="text" id="username" name="username" placeholder="학번 또는 아이디를 입력하세요" required />
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
        </div>

        <div th:if="${param.error}" class="error-message">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <button type="submit" class="btn-login">로그인</button>
    </form>

    <div class="divider">
        <span>또는</span>
    </div>

    <div class="link-section">
        <a th:href="@{/join}">회원가입</a>
    </div>
</div>
</body>
</html>
