<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <title>수강신청</title>
    <style>
        body{font-family:system-ui,Roboto,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;margin:20px;color:#1f2937}
        h1{margin:0 0 16px;font-size:22px}

        form.search{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:12px}
        label{display:flex;flex-direction:column;font-size:12px;color:#6b7280}
        input[type="text"]{height:36px;border:1px solid #e5e7eb;border-radius:8px;padding:0 10px;min-width:180px}
        button[type="submit"]{height:36px;border-radius:8px;border:1px solid #2563eb;background:#2563eb;color:#fff;padding:0 14px;cursor:pointer}

        table{width:100%;border-collapse:collapse;margin-top:10px;table-layout: fixed;}
        th, td {
            border: 1px solid #e5e7eb;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            vertical-align: middle;
        }
        th{background:#f9fafb;color:#6b7280}
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 110px;
            height: 36px;
            padding: 0;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .btn-blue {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }

        .btn-ghost {
            background: #fff;
            color: #374151;
        }
        td form {
            display: inline-block;
            margin: 0;
            text-align: center;
        }
        .btn.disabled,.btn:disabled{opacity:.5;cursor:not-allowed}
        .pagination{margin-top:16px;text-align:center}
        .pagination a,.pagination span{display:inline-block;margin:0 4px;padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;text-decoration:none;color:#374151}
        .pagination .active{background:#eef2ff;border-color:#c7d2fe;font-weight:700}
        .muted{color:#6b7280;font-size:12px}
        #queueModal {
            display: none; /* 평소에는 숨김 */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5); /* 배경 어둡게 */
        }
        .modal-content {
            background-color: #fff;
            margin: 15% auto; /* 화면 중앙 배치 */
            padding: 20px;
            border: 1px solid #888;
            width: 300px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
        }
        .btn,
        .btn-blue,
        .btn-ghost {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            line-height: 36px;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<h1>수강신청</h1>

<!-- 탭 네비게이션 -->
<nav class="tabs">
    <a th:href="@{/courses}"
       th:classappend="${activeTab}=='register' ? ' active'">수강신청</a>
    <a th:href="@{/my/courses}"
       th:classappend="${activeTab}=='applied' ? ' active'">신청내역</a>
    <a th:href="@{/courses/wishlist}"
       th:classappend="${activeTab}=='wishlist' ? ' active'">희망수업</a>
</nav>

<style>
    .tabs{display:flex;gap:10px;margin:14px 0;border-bottom:1px solid #e5e7eb}
    .tabs a{padding:10px 14px;border:1px solid transparent;border-bottom:none;
        border-top-left-radius:8px;border-top-right-radius:8px;
        color:#374151;text-decoration:none}
    .tabs a:hover{background:#f9fafb}
    .tabs a.active{background:#fff;border-color:#e5e7eb;border-bottom:1px solid #fff;
        font-weight:700}
</style>


<!-- 🔎 필터: 결과 엔드포인트로 GET -->
<form class="search" th:action="@{/courses/search}" method="get" th:if="${activeTab != 'wishlist'}">
    <label>학수번호
        <input type="text" name="code" th:value="${filters.code}" placeholder="예: AIX0002">
    </label>
    <label>교과명
        <input type="text" name="subjectName" th:value="${filters.subjectName}" placeholder="예: 자료구조">
    </label>
    <label>교수명
        <input type="text" name="professorName" th:value="${filters.professorName}" placeholder="예: 홍길동">
    </label>
    <button type="submit">조회</button>
</form>

<!-- 건수: 검색 후에만 노출 -->
<div class="muted" th:if="${hasSearched}"
     th:text="'총 ' + ${page.totalElements} + '건 / ' + '페이지 ' + (${page.number + 1}) + ' / ' + ${page.totalPages}">
    총 0건
</div>

<!-- 📋 결과 테이블: 검색 후에만 -->
<table aria-label="과목 목록" th:if="${hasSearched}">
    <thead>
    <tr>
        <th style="width:110px">수강신청</th>
        <th style="width:110px">희망신청</th>
        <th>교과명</th>
        <th style="width:140px">교수명</th>
        <th style="width:80px">학점</th>
        <th style="width:80px">제한인원</th>
        <th style="width:80px">신청인원</th>
        <th style="width:140px">학수번호</th>
        <th style="width:260px">수업 요일·시간</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${subjects}">
        <!-- 수강신청 버튼(활성/비활성 토글) -->
        <td>
            <!-- 신청 안 한 과목이면 '수강신청' 버튼 -->
            <button th:if="${!s.registered}"
                    class="btn btn-blue"
                    type="button"
                    th:attr="data-code=${s.code}"
                    onclick="startApplication(this.dataset.code)">
                수강신청
            </button>

            <!-- 이미 신청한 과목이면 버튼 없음 (또는 텍스트 표시) -->
            <span th:if="${s.registered}" style="color:gray;">신청 완료</span>
        </td>

        <!-- 희망 버튼(활성/비활성 토글) -->
        <td>
            <form th:action="@{/courses/wish}" method="post" style="display:inline">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}">
                <input type="hidden" name="code" th:value="${s.code}">
                <button class="btn btn-ghost" type="submit"
                        th:disabled="${s.liked}" th:classappend="${s.liked} ? ' disabled'">
                    희망추가
                </button>
            </form>
            <span th:if="${s.liked}"></span>
        </td>

        <!-- 과목 정보 -->
        <td th:text="${s.subjectName}">교과명</td>
        <td th:text="${s.professorName}">홍길동</td>
        <td th:text="${s.score + '학점'}">3학점</td>
        <td th:text="${s.limitedNum}">30</td>
        <td th:text="${s.registeredNum}">30</td>
        <td th:text="${s.code}">CS101</td>
        <td th:text="${s.subjectDay + ' ' + s.startTime + ' ~ ' + s.endTime}">화 13:00 ~ 14:30</td>
    </tr>

    <!-- 빈 상태: 검색 후인데 결과가 없을 때만 -->
    <tr th:if="${hasSearched and #lists.isEmpty(subjects)}">
        <td colspan="9">조건에 맞는 과목이 없습니다.</td>
    </tr>
    </tbody>
</table>

<!-- 📑 페이징: 검색 후에만 -->
<div class="pagination" th:if="${hasSearched and page.totalPages > 1}">
    <a th:if="${page.hasPrevious()}"
       th:href="@{/courses/search(page=${page.number-1}, size=${page.size},
                                code=${filters.code}, subjectName=${filters.subjectName}, professorName=${filters.professorName})}">
        이전
    </a>

    <span th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
          th:classappend="${i == page.number} ? 'active'">
    <a th:href="@{/courses/search(page=${i}, size=${page.size},
                                  code=${filters.code}, subjectName=${filters.subjectName}, professorName=${filters.professorName})}"
       th:text="${i + 1}">1</a>
  </span>

    <a th:if="${page.hasNext()}"
       th:href="@{/courses/search(page=${page.number+1}, size=${page.size},
                                code=${filters.code}, subjectName=${filters.subjectName}, professorName=${filters.professorName})}">
        다음
    </a>
</div>

<div id="queueModal">
    <div class="modal-content">
        <h3>⏳ 수강신청 대기 중</h3>
        <p id="modalMessage">잠시만 기다려주세요...</p>

        <p id="positionCount" style="font-size:30px; font-weight:bold; color:#2563eb;">-</p>
    </div>
</div>


<script th:inline="javascript">
    /*<![CDATA[*/
    window.addEventListener('DOMContentLoaded', function() {
        var message = /*[[${message}]]*/ null;
        var errorMessage = /*[[${errorMessage}]]*/ null;

        if (message) {
            alert(message);
        }

        if (errorMessage) {
            alert(errorMessage);
        }
    });

    const csrfToken = document.querySelector("meta[name='_csrf']")?.getAttribute("content");
    const csrfHeader = document.querySelector("meta[name='_csrf_header']")?.getAttribute("content");

    let pollingInterval = null;
    const modal = document.getElementById('queueModal');
    const msgElem = document.getElementById('modalMessage');
    const countElem = document.getElementById('positionCount');

    // 1. 수강신청 시작 (POST /courses/apply)
    function startApplication(code) {
        if(!confirm("수강신청 하시겠습니까?")) return;

        modal.style.display = "block";
        msgElem.innerText = "대기열 진입 중...";
        countElem.innerText = "-";

        fetch('/courses/apply', { // [수정된 컨트롤러 메서드 매핑]
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                [csrfHeader]: csrfToken
            },
            body: new URLSearchParams({ code: code })
        })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'WAITING') {
                    pollStatus(code); // 폴링 시작
                } else {
                    alert(data.message);
                    closeModal();
                }
            })
            .catch(err => {
                console.error(err);
                alert("오류 발생");
                closeModal();
            });
    }

    // 2. 상태 확인 (GET /courses/apply/try)
    // register-form.html 의 pollStatus 함수 수정
    function pollStatus(code) {
        pollingInterval = setInterval(() => {
            fetch('/courses/apply/try?code=' + code)
                .then(res => res.json())
                .then(data => {
                    // [디버깅용] 서버가 주는 데이터를 콘솔에 찍어봅니다.
                    console.log("서버 응답:", data);

                    if (data.status === 'WAITING') {
                        msgElem.innerText = "현재 대기 순번";
                        // 데이터가 있으면 보여주고, 없으면 '집계중' 표시
                        if (data.position !== null && data.position !== undefined) {
                            countElem.innerText = data.position + "명";
                        } else {
                            countElem.innerText = "집계 중...";
                        }
                    } else if (data.status === 'SUCCESS') {
                        clearInterval(pollingInterval);
                        alert(data.message);
                        closeModal();
                        location.reload();
                    } else {
                        clearInterval(pollingInterval);
                        alert("실패: " + data.message);
                        closeModal();
                    }
                })
                .catch(err => console.error("통신 에러:", err));
        }, 1000);
    }

    function closeModal() {
        modal.style.display = "none";
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
        }
    }
    /*]]>*/
</script>

</body>
</html>
