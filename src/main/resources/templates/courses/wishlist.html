<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <title>희망수업 - 수강신청</title>
    <style>
        body{font-family:system-ui,Roboto,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;margin:20px;color:#1f2937}
        h1{margin:0 0 16px;font-size:22px}
        table{width:100%;border-collapse:collapse;margin-top:10px;table-layout: fixed;}
        th, td {
            border: 1px solid #e5e7eb;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            vertical-align: middle;
        }
        th{background:#f9fafb;color:#6b7280}
        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 110px;
            height: 36px;
            padding: 0;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .btn-blue {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
        }

        .btn-ghost {
            background: #fff;
            color: #374151;
        }
        td form {
            display: inline-block;
            margin: 0;
            text-align: center;
        }
        .pagination{margin-top:16px;text-align:center}
        .pagination a,.pagination span{display:inline-block;margin:0 4px;padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;text-decoration:none;color:#374151}
        .pagination .active{background:#eef2ff;border-color:#c7d2fe;font-weight:700}
        .muted{color:#6b7280;font-size:12px}
        .tabs{display:flex;gap:10px;margin:14px 0;border-bottom:1px solid #e5e7eb}
        .tabs a{padding:10px 14px;border:1px solid transparent;border-bottom:none;
            border-top-left-radius:8px;border-top-right-radius:8px;
            color:#374151;text-decoration:none}
        .tabs a:hover{background:#f9fafb}
        .tabs a.active{background:#fff;border-color:#e5e7eb;border-bottom:1px solid #fff;
            font-weight:700}

        td:first-child,
        td:nth-child(2) {
            text-align: center;
        }
        td:first-child form,
        td:nth-child(2) form {
            display: inline-block;
            margin: 0;
        }
    </style>
</head>
<body>

<h1>희망수업</h1>

<!-- 탭 네비게이션 -->
<nav class="tabs">
    <a th:href="@{/courses}">수강신청</a>
    <a th:href="@{/my/courses}">신청내역</a>
    <a th:href="@{/courses/wishlist}" class="active">희망수업</a>
</nav>

<!-- 희망과목 건수 표시 -->
<div class="muted" th:if="${likeSubjectPage != null}"
     th:text="'총 ' + ${likeSubjectPage.totalElements} + '개 희망과목 / ' + '페이지 ' + (${likeSubjectPage.number + 1}) + ' / ' + ${likeSubjectPage.totalPages}">
    총 0개 희망과목
</div>

<!-- 희망과목 테이블 -->
<table th:if="${likeSubjectPage != null and !likeSubjectPage.empty}">
    <thead>
    <tr>
        <th style="width:110px">수강신청</th>
        <th style="width:110px">희망삭제</th>
        <th>교과명</th>
        <th style="width:140px">교수명</th>
        <th style="width:120px">제한인원</th>
        <th style="width:140px">학수번호</th>
        <th style="width:260px">수업 요일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="likeSubject : ${likeSubjectPage.content}">
        <!-- 수강신청: 대기열 없이 form submit -->
        <td>
            <form th:if="${!likeSubject.isRegistered}" th:action="@{/courses/apply}" method="post" style="display:inline">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}">
                <input type="hidden" name="code" th:value="${likeSubject.code}">
                <button class="btn btn-blue" type="submit"
                        onclick="return confirm('수강신청 하시겠습니까?');">
                    수강신청
                </button>
            </form>
            <span th:if="${likeSubject.isRegistered}" style="color:gray;">신청완료</span>
        </td>

        <td>
            <form th:action="@{/remove-wish}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}">
                <input type="hidden" name="code" th:value="${likeSubject.code}">
                <button type="submit" class="btn btn-ghost"
                        onclick="return confirm('희망과목에서 삭제하시겠습니까?')">삭제</button>
            </form>
        </td>

        <td th:text="${likeSubject.subjectName}">과목명</td>
        <td th:text="${likeSubject.professorName}">교수명</td>
        <td th:text="${likeSubject.limitedNum}">30</td>
        <td th:text="${likeSubject.code}">과목코드</td>
        <td th:text="${likeSubject.subjectDay + ' ' + likeSubject.startTime + ' ~ ' + likeSubject.endTime}">월요일 09:00 ~ 10:30</td>
    </tr>
    </tbody>
</table>

<!-- 희망과목이 없을 때 -->
<div th:if="${likeSubjectPage == null or likeSubjectPage.empty}">
    <p style="text-align: center; color: #6b7280; margin: 50px 0;">희망 과목이 없습니다.</p>
</div>

<!-- 희망과목 페이징 -->
<div class="pagination" th:if="${likeSubjectPage != null and likeSubjectPage.totalPages > 1}">
    <a th:if="${likeSubjectPage.hasPrevious()}"
       th:href="@{/courses/wishlist(page=${likeSubjectPage.number-1}, size=${likeSubjectPage.size})}">
        이전
    </a>

    <span th:each="i : ${#numbers.sequence(0, likeSubjectPage.totalPages - 1)}"
          th:classappend="${i == likeSubjectPage.number} ? 'active'">
        <a th:href="@{/courses/wishlist(page=${i}, size=${likeSubjectPage.size})}"
           th:text="${i + 1}">1</a>
    </span>

    <a th:if="${likeSubjectPage.hasNext()}"
       th:href="@{/courses/wishlist(page=${likeSubjectPage.number+1}, size=${likeSubjectPage.size})}">
        다음
    </a>
</div>

<!-- 메시지 알림 -->
<script th:inline="javascript">
    /*<![CDATA[*/
    window.addEventListener('DOMContentLoaded', function() {
        var message = /*[[${message}]]*/ null;
        var errorMessage = /*[[${errorMessage}]]*/ null;

        if (message) alert(message);
        if (errorMessage) alert(errorMessage);
    });
    /*]]>*/
</script>

</body>
</html>
